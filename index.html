<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citadel Maps — Safe Route AI</title>

    <!-- Leaflet CSS (free, open-source maps) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep:    #060b16;
            --bg-panel:   rgba(6, 11, 22, 0.90);
            --bg-input:   rgba(255,255,255,0.05);
            --border:     rgba(0, 210, 255, 0.14);
            --accent:     #00d4ff;
            --accent-dim: rgba(0, 212, 255, 0.25);
            --text-1:     #dff0f8;
            --text-2:     #6a94b0;
            --safe:       #00ffaa;
            --warn:       #ffb800;
            --danger:     #ff3c3c;
            --blue:       #4f8eff;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-deep);
            color: var(--text-1);
        }

        /* ── MAP ─────────────────────────────────────────────────────────── */
        #map {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .leaflet-control-attribution,
        .leaflet-control-zoom { display: none !important; }

        /* ── PANEL ───────────────────────────────────────────────────────── */
        #panel {
            position: absolute;
            top: 14px;
            left: 14px;
            z-index: 1000;
            width: 308px;
            background: var(--bg-panel);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: visible;
            box-shadow:
                0 0 0 1px rgba(0,212,255,0.04),
                0 12px 40px rgba(0,0,0,0.7),
                inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .panel-head {
            padding: 15px 18px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(130deg, rgba(0,212,255,0.07) 0%, transparent 70%);
            display: flex;
            align-items: center;
            gap: 11px;
            border-radius: 18px 18px 0 0;
        }

        .shield {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, var(--accent), #007baa);
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 0 14px rgba(0,212,255,0.35);
        }

        .app-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 22px;
            letter-spacing: 2.5px;
            color: var(--accent);
            line-height: 1;
        }
        .app-sub {
            font-size: 9.5px;
            color: var(--text-2);
            letter-spacing: 1.8px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .panel-body {
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 9px;
        }

        /* ── INPUTS & AUTOCOMPLETE ───────────────────────────────────────── */
        .input-wrap {
            position: relative;
        }

        .dot {
            position: absolute;
            left: 11px; top: 50%;
            transform: translateY(-50%);
            width: 8px; height: 8px;
            border-radius: 50%;
            z-index: 2;
            pointer-events: none;
        }
        .dot-start { background: var(--safe);   box-shadow: 0 0 7px var(--safe); }
        .dot-end   { background: var(--danger);  box-shadow: 0 0 7px var(--danger); }

        .s-input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px 10px 28px;
            color: var(--text-1);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color .2s, background .2s;
        }
        .s-input:focus {
            border-color: var(--accent);
            background: rgba(0,212,255,0.05);
        }
        .s-input::placeholder { color: var(--text-2); }

        .ac-drop {
            display: none;
            position: absolute;
            top: calc(100% + 5px);
            left: 0; right: 0;
            background: rgba(8,14,28,0.98);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 11px;
            z-index: 3000;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .ac-drop.open { display: block; }

        .ac-item {
            padding: 9px 13px;
            font-size: 12px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background .15s;
        }
        .ac-item:hover { background: rgba(0,212,255,0.08); }
        .ac-item:last-child { border-bottom: none; }
        .ac-name   { font-weight: 600; color: var(--text-1); }
        .ac-detail { font-size: 10.5px; color: var(--text-2); margin-top: 1px; }

        /* ── BUTTON ─────────────────────────────────────────────────────── */
        #route-btn {
            width: 100%;
            padding: 11px;
            background: linear-gradient(135deg, var(--accent), #0099cc);
            border: none;
            border-radius: 10px;
            color: #000;
            font-family: 'Bebas Neue', cursive;
            font-size: 15px;
            letter-spacing: 2.5px;
            cursor: pointer;
            transition: opacity .2s, transform .1s, box-shadow .2s;
            box-shadow: 0 4px 16px rgba(0,212,255,0.25);
        }
        #route-btn:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,212,255,0.4); }
        #route-btn:active:not(:disabled) { transform: translateY(0); }
        #route-btn:disabled { opacity: .45; cursor: not-allowed; }

        /* ── ROUTE INFO ─────────────────────────────────────────────────── */
        #route-info {
            display: none;
            background: rgba(0,0,0,0.28);
            border: 1px solid var(--border);
            border-radius: 11px;
            padding: 13px;
        }

        .score-wrap { text-align: center; }
        .score-lbl {
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-2);
        }
        .score-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 52px;
            font-weight: 700;
            line-height: 1;
            margin: 2px 0;
        }
        .score-risk {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .score-track {
            height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            margin: 10px 0;
            overflow: hidden;
        }
        .score-fill {
            height: 100%;
            border-radius: 2px;
            transition: width .9s cubic-bezier(.4,0,.2,1);
        }

        .dist-line {
            text-align: center;
            font-size: 11px;
            color: var(--text-2);
            margin-bottom: 9px;
        }

        .dur-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .dur-cell {
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
            padding: 8px 10px;
        }
        .dur-mode { font-size: 10px; color: var(--text-2); text-transform: uppercase; letter-spacing: .8px; }
        .dur-val  { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; color: var(--text-1); margin-top: 3px; }

        .route-key {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }
        .rk-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text-2); }
        .rk-line  { width: 22px; height: 4px; border-radius: 2px; }

        /* ── LEGEND ─────────────────────────────────────────────────────── */
        #legend {
            position: absolute;
            bottom: 20px; right: 14px;
            z-index: 1000;
            background: var(--bg-panel);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 13px;
            padding: 13px 15px;
            min-width: 175px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .leg-title {
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-2);
            font-weight: 600;
            margin-bottom: 10px;
        }
        .leg-row {
            display: flex;
            align-items: center;
            gap: 9px;
            margin-bottom: 7px;
            font-size: 12px;
            color: var(--text-1);
        }
        .leg-row:last-child { margin-bottom: 0; }
        .leg-dot {
            width: 11px; height: 11px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ── SOS ────────────────────────────────────────────────────────── */
        #sos-btn {
            position: absolute;
            bottom: 20px; left: 14px;
            z-index: 1000;
            width: 58px; height: 58px;
            background: radial-gradient(circle at 40% 35%, #ff2a2a, #aa0000);
            border: 2px solid rgba(255,80,80,0.45);
            border-radius: 50%;
            color: white;
            font-family: 'Bebas Neue', cursive;
            font-size: 15px;
            letter-spacing: 2px;
            cursor: pointer;
            animation: sos-glow 2.8s ease-in-out infinite;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            transition: transform .15s;
        }
        #sos-btn:hover { transform: scale(1.07); animation: none; box-shadow: 0 0 28px rgba(255,40,40,0.65); }
        @keyframes sos-glow {
            0%,100% { box-shadow: 0 0 14px rgba(255,40,40,0.35), 0 4px 14px rgba(0,0,0,0.5); }
            50%      { box-shadow: 0 0 28px rgba(255,40,40,0.65), 0 4px 14px rgba(0,0,0,0.5); }
        }

        /* ── THEME TOGGLE ───────────────────────────────────────────────── */
        #theme-btn {
            position: absolute;
            top: 14px; right: 14px;
            z-index: 1000;
            width: 40px; height: 40px;
            background: var(--bg-panel);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 14px rgba(0,0,0,0.35);
            transition: background .2s;
        }
        #theme-btn:hover { background: rgba(0,212,255,0.1); }

        /* ── TOAST ──────────────────────────────────────────────────────── */
        #toast {
            position: absolute;
            bottom: 95px;
            left: 50%; transform: translateX(-50%) translateY(14px);
            z-index: 2000;
            background: rgba(6,14,28,0.96);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 9px 20px;
            font-size: 13px;
            color: var(--text-1);
            backdrop-filter: blur(20px);
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
            transition: opacity .28s, transform .28s;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #toast.err  { border-color: rgba(255,60,60,0.5); color: #ff8080; }
        #toast.ok   { border-color: rgba(0,255,170,0.5); color: var(--safe); }

        /* ── SPINNER ────────────────────────────────────────────────────── */
        .spin {
            display: inline-block;
            width: 11px; height: 11px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spinning .55s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spinning { to { transform: rotate(360deg); } }

        /* ── DATA LOADING INDICATOR ─────────────────────────────────────── */
        #data-status {
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 11px;
            color: var(--text-2);
            display: flex;
            align-items: center;
            gap: 7px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.4);
            transition: opacity .4s;
        }
        #data-status.hidden { opacity: 0; pointer-events: none; }
        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--warn);
            animation: blink 1.2s ease-in-out infinite;
        }
        .status-dot.ready { background: var(--safe); animation: none; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    </style>
</head>
<body>

    <!-- Map -->
    <div id="map"></div>

    <!-- Panel -->
    <div id="panel">
        <div class="panel-head">
            <div class="shield">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                     stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            </div>
            <div>
                <div class="app-title">Citadel Maps</div>
                <div class="app-sub">Safety-Aware Navigation</div>
            </div>
        </div>

        <div class="panel-body">
            <!-- Start -->
            <div class="input-wrap">
                <div class="dot dot-start"></div>
                <input id="start-input" class="s-input" type="text"
                       placeholder="Starting point…" autocomplete="off">
                <div class="ac-drop" id="start-drop"></div>
            </div>

            <!-- Destination -->
            <div class="input-wrap">
                <div class="dot dot-end"></div>
                <input id="end-input" class="s-input" type="text"
                       placeholder="Destination…" autocomplete="off">
                <div class="ac-drop" id="end-drop"></div>
            </div>

            <!-- Button -->
            <button id="route-btn">Find Safest Route</button>

            <!-- Route result -->
            <div id="route-info">
                <div class="score-wrap">
                    <div class="score-lbl">Safety Score</div>
                    <div class="score-num" id="score-num">--</div>
                    <div class="score-risk" id="score-risk"></div>
                </div>
                <div class="score-track">
                    <div class="score-fill" id="score-fill" style="width:0%"></div>
                </div>
                <div class="dist-line" id="dist-line"></div>
                <div class="dur-grid">
                    <div class="dur-cell">
                        <div class="dur-mode">🚶 Walk</div>
                        <div class="dur-val" id="d-walk">--</div>
                    </div>
                    <div class="dur-cell">
                        <div class="dur-mode">🚗 Drive</div>
                        <div class="dur-val" id="d-drive">--</div>
                    </div>
                    <div class="dur-cell">
                        <div class="dur-mode">🚲 Cycle</div>
                        <div class="dur-val" id="d-cycle">--</div>
                    </div>
                    <div class="dur-cell">
                        <div class="dur-mode">🚌 Transit</div>
                        <div class="dur-val" id="d-transit">N/A</div>
                    </div>
                </div>
                <div class="route-key">
                    <div class="rk-item"><div class="rk-line" style="background:var(--safe)"></div>Safest</div>
                    <div class="rk-item"><div class="rk-line" style="background:var(--warn)"></div>Moderate</div>
                    <div class="rk-item"><div class="rk-line" style="background:var(--danger)"></div>High Risk</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Data status pill -->
    <div id="data-status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Loading safety data…</span>
    </div>

    <!-- Theme toggle -->
    <button id="theme-btn" title="Toggle theme">🌙</button>

    <!-- Legend -->
    <div id="legend">
        <div class="leg-title">Risk Indicators</div>
        <div class="leg-row">
            <div class="leg-dot" style="background:#ff3c3c;box-shadow:0 0 6px rgba(255,60,60,.65)"></div>
            Harassment / Incident
        </div>
        <div class="leg-row">
            <div class="leg-dot" style="background:#ffb800;box-shadow:0 0 6px rgba(255,184,0,.65)"></div>
            Poorly Lit Area
        </div>
        <div class="leg-row">
            <div class="leg-dot" style="background:#4f8eff;box-shadow:0 0 6px rgba(79,142,255,.65)"></div>
            Too Crowded
        </div>
        <div class="leg-row">
            <div class="leg-dot" style="background:#00ffaa;box-shadow:0 0 6px rgba(0,255,170,.65)"></div>
            All Safe
        </div>
        <div class="leg-row">
            <div class="leg-dot" style="background:#2563eb;border:2px solid #fff;"></div>
            Police Station
        </div>
    </div>

    <!-- SOS -->
    <button id="sos-btn">SOS</button>

    <!-- Toast -->
    <div id="toast"></div>

    <!-- ── Leaflet JS (free, no key needed) ─────────────────────────────── -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- ── Firebase (keep your existing project) ────────────────────────── -->
    <script type="module">
        import { initializeApp }  from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, query, onSnapshot }
            from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        /* ─── Firebase config (unchanged from your project) ─────────────── */
        const firebaseConfig = {
            apiKey:            "AIzaSyBbQrJCnNISZqrKrlyDSt7oLz558Um9DTM",
            authDomain:        "saferoute-ai-685e3.firebaseapp.com",
            projectId:         "saferoute-ai-685e3",
            storageBucket:     "saferoute-ai-685e3.appspot.com",
            messagingSenderId: "874452490466",
            appId:             "1:874452490466:web:077ba705107e0766b366bb"
        };

        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);

        /* ─── State ──────────────────────────────────────────────────────── */
        let map, darkLayer, lightLayer;
        let isDark          = true;
        let dangerPoints    = [];        // { lat, lng, weight }
        let reportMarkers   = [];
        let safeZonesData   = [];        // { lat, lng, name, marker }
        let routeLayers     = [];
        let currentPosition = null;
        let userMarker      = null;
        let isSafeDataReady = false;
        let selectedStart   = null;      // { lat, lng }
        let selectedEnd     = null;
        let startTimer, endTimer;
        let toastTimer;

        /* ─── Helpers ────────────────────────────────────────────────────── */
        function fmtDuration(seconds) {
            const m = Math.round(seconds / 60);
            return m < 60 ? `${m} min` : `${Math.floor(m/60)}h ${m%60}m`;
        }
        function fmtDistance(m) {
            return m < 1000 ? `${Math.round(m)} m` : `${(m/1000).toFixed(1)} km`;
        }

        function showToast(msg, type = '') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `show ${type}`;
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { t.className = ''; }, 3200);
        }

        function divIcon(html, size) {
            return L.divIcon({ className: '', html, iconSize: size, iconAnchor: [size[0]/2, size[1]/2] });
        }

        /* ─── Map init ───────────────────────────────────────────────────── */
        function initMap() {
            map = L.map('map', { center: [16.5062, 80.6480], zoom: 14,
                                  zoomControl: false, attributionControl: false });

            darkLayer  = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
                                      { maxZoom: 19 }).addTo(map);
            lightLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
                                      { maxZoom: 19 });
        }

        /* ─── Geolocation ────────────────────────────────────────────────── */
        function initGeo() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(pos => {
                currentPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                map.setView([currentPosition.lat, currentPosition.lng], 15);

                userMarker = L.marker([currentPosition.lat, currentPosition.lng],
                    { icon: divIcon(
                        `<div style="width:16px;height:16px;background:#00d4ff;border-radius:50%;
                         border:3px solid rgba(0,212,255,.3);box-shadow:0 0 14px #00d4ff;"></div>`,
                        [16,16]) }
                ).addTo(map).bindPopup('<b>📍 You are here</b>');

                startSafeZoneChecker();
            }, () => console.log('Geolocation denied.'));
        }

        /* ─── Theme ──────────────────────────────────────────────────────── */
        document.getElementById('theme-btn').addEventListener('click', () => {
            isDark = !isDark;
            document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
            if (isDark) { map.removeLayer(lightLayer); darkLayer.addTo(map); }
            else        { map.removeLayer(darkLayer);  lightLayer.addTo(map); }
        });

        /* ─── Nominatim Autocomplete (free, no key needed) ───────────────── */
        function setupAC(inputId, dropId, onPick) {
            const inp  = document.getElementById(inputId);
            const drop = document.getElementById(dropId);

            inp.addEventListener('input', () => {
                const timer = inputId === 'start-input' ? 'startTimer' : 'endTimer';
                clearTimeout(inputId === 'start-input' ? startTimer : endTimer);
                const val = inp.value.trim();
                if (val.length < 3) { drop.classList.remove('open'); return; }

                const t = setTimeout(async () => {
                    try {
                        const r = await fetch(
                            `https://nominatim.openstreetmap.org/search?` +
                            `q=${encodeURIComponent(val)}&format=json&limit=5&addressdetails=1`,
                            { headers: { 'Accept-Language': 'en' } }
                        );
                        renderAC(await r.json(), drop, inp, onPick);
                    } catch (e) { console.error('Nominatim:', e); }
                }, 380);

                if (inputId === 'start-input') startTimer = t; else endTimer = t;
            });

            inp.addEventListener('blur', () =>
                setTimeout(() => drop.classList.remove('open'), 220));
        }

        function renderAC(results, drop, inp, onPick) {
            if (!results.length) { drop.classList.remove('open'); return; }
            drop.innerHTML = '';
            results.forEach(r => {
                const parts  = r.display_name.split(', ');
                const name   = parts[0];
                const detail = parts.slice(1, 4).join(', ');
                const el     = document.createElement('div');
                el.className = 'ac-item';
                el.innerHTML = `<div class="ac-name">${name}</div><div class="ac-detail">${detail}</div>`;
                el.addEventListener('mousedown', () => {
                    inp.value = r.display_name;
                    drop.classList.remove('open');
                    onPick({ lat: parseFloat(r.lat), lng: parseFloat(r.lon) });
                });
                drop.appendChild(el);
            });
            drop.classList.add('open');
        }

        setupAC('start-input', 'start-drop', p => { selectedStart = p; });
        setupAC('end-input',   'end-drop',   p => { selectedEnd   = p; });

        /* ─── OSRM Routing (free, no key needed) ─────────────────────────── */
        const OSRM = 'https://router.project-osrm.org/route/v1';

        async function osrmRoute(from, to, profile = 'foot') {
            const url = `${OSRM}/${profile}/${from.lng},${from.lat};${to.lng},${to.lat}` +
                        `?alternatives=true&steps=false&geometries=geojson&overview=full`;
            const r = await fetch(url);
            if (!r.ok) throw new Error('OSRM ' + r.status);
            return r.json();
        }

        /* ─── Safety Scoring ─────────────────────────────────────────────── */
        function scoreRoute(geoCoords) {
            // geoCoords = [[lng, lat], ...] from OSRM GeoJSON
            const THRESHOLD = 250; // metres
            let danger = 0;

            dangerPoints.forEach(pt => {
                const ptLL = L.latLng(pt.lat, pt.lng);
                const near = geoCoords.some(c =>
                    L.latLng(c[1], c[0]).distanceTo(ptLL) < THRESHOLD
                );
                if (near) danger += pt.weight;
            });

            const lengthKm = geoCoords.reduce((sum, c, i) => {
                if (i === 0) return sum;
                return sum + L.latLng(geoCoords[i-1][1], geoCoords[i-1][0])
                              .distanceTo(L.latLng(c[1], c[0]));
            }, 0) / 1000;

            if (lengthKm <= 0) return 100;
            const density = danger / lengthKm;
            return Math.round(Math.max(0, 1 - density / 10) * 100);
        }

        /* ─── Route colours ──────────────────────────────────────────────── */
        function routeColor(score, isSafest) {
            if (isSafest)   return '#00ffaa';
            if (score < 50) return '#ff3c3c';
            if (score < 80) return '#ffb800';
            return '#4f8eff';
        }

        /* ─── Calculate & Display Route ──────────────────────────────────── */
        async function findRoute() {
            if (!isSafeDataReady) { showToast('Safety data loading… try again shortly.', 'err'); return; }
            if (!selectedStart)   { showToast('Please pick a starting point from the list.', 'err'); return; }
            if (!selectedEnd)     { showToast('Please pick a destination from the list.', 'err'); return; }

            routeLayers.forEach(l => map.removeLayer(l));
            routeLayers = [];

            const btn = document.getElementById('route-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spin"></span>Calculating…';

            ['d-walk','d-drive','d-cycle'].forEach(id => {
                document.getElementById(id).textContent = '…';
            });

            try {
                /* Walking routes (alternatives) */
                const wData = await osrmRoute(selectedStart, selectedEnd, 'foot');
                if (!wData.routes?.length) throw new Error('No routes found');

                const scored = wData.routes.map(r => ({
                    r, coords: r.geometry.coordinates,
                    score: scoreRoute(r.geometry.coordinates)
                }));

                const maxScore  = Math.max(...scored.map(x => x.score));
                let   safestRef = null;

                /* Draw worst-first so safest is on top */
                [...scored].sort((a,b) => a.score - b.score).forEach(({ r, coords, score }) => {
                    const isSafest = score === maxScore && safestRef === null;
                    if (isSafest) safestRef = { r, score };

                    const lls   = coords.map(c => [c[1], c[0]]);
                    const layer = L.polyline(lls, {
                        color:   routeColor(score, isSafest),
                        weight:  isSafest ? 7 : 4,
                        opacity: isSafest ? 0.95 : 0.5,
                        lineCap: 'round', lineJoin: 'round'
                    }).addTo(map);
                    routeLayers.push(layer);
                });

                /* Fit bounds */
                if (safestRef) {
                    const lls = safestRef.r.geometry.coordinates.map(c => [c[1], c[0]]);
                    map.fitBounds(L.latLngBounds(lls), { padding: [60,60] });
                    updateScoreUI(safestRef.score, safestRef.r.distance);
                    document.getElementById('d-walk').textContent = fmtDuration(safestRef.r.duration);
                }

                /* Drive duration */
                osrmRoute(selectedStart, selectedEnd, 'driving').then(d => {
                    document.getElementById('d-drive').textContent =
                        d.routes?.[0] ? fmtDuration(d.routes[0].duration) : 'N/A';
                }).catch(() => { document.getElementById('d-drive').textContent = 'N/A'; });

                /* Cycling duration */
                osrmRoute(selectedStart, selectedEnd, 'cycling').then(d => {
                    document.getElementById('d-cycle').textContent =
                        d.routes?.[0] ? fmtDuration(d.routes[0].duration) : 'N/A';
                }).catch(() => { document.getElementById('d-cycle').textContent = 'N/A'; });

            } catch(e) {
                console.error(e);
                showToast('Could not find routes — try different locations.', 'err');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Find Safest Route';
            }
        }

        function updateScoreUI(score, distM) {
            const numEl  = document.getElementById('score-num');
            const riskEl = document.getElementById('score-risk');
            const fillEl = document.getElementById('score-fill');
            const distEl = document.getElementById('dist-line');

            numEl.textContent  = score;
            distEl.textContent = `Distance: ${fmtDistance(distM)}`;
            fillEl.style.width = score + '%';

            if (score >= 80) {
                numEl.style.color  = 'var(--safe)';
                riskEl.style.color = 'var(--safe)';
                riskEl.textContent = 'LOW RISK';
                fillEl.style.background = 'linear-gradient(90deg, #00cc80, #00ffaa)';
            } else if (score >= 50) {
                numEl.style.color  = 'var(--warn)';
                riskEl.style.color = 'var(--warn)';
                riskEl.textContent = 'MODERATE RISK';
                fillEl.style.background = 'linear-gradient(90deg, #cc9000, #ffb800)';
            } else {
                numEl.style.color  = 'var(--danger)';
                riskEl.style.color = 'var(--danger)';
                riskEl.textContent = 'HIGH RISK';
                fillEl.style.background = 'linear-gradient(90deg, #cc0000, #ff3c3c)';
            }

            document.getElementById('route-info').style.display = 'block';
        }

        document.getElementById('route-btn').addEventListener('click', findRoute);

        /* ─── Firebase: Safety Reports ───────────────────────────────────── */
        function initHeatmap() {
            onSnapshot(query(collection(db, 'checkins')), snapshot => {
                dangerPoints = [];
                reportMarkers.forEach(m => map.removeLayer(m));
                reportMarkers = [];

                snapshot.forEach(doc => {
                    const d   = doc.data();
                    const lat = d.Location?.lat || d.location?.lat;
                    const lng = d.Location?.lng || d.location?.lng;
                    if (!lat || !lng) return;

                    let weight = 0, color = '#00ffaa', glow = 'rgba(0,255,170,.5)';
                    switch (d.type) {
                        case 'incident': weight=5; color='#ff3c3c'; glow='rgba(255,60,60,.5)';   break;
                        case 'unlit':    weight=3; color='#ffb800'; glow='rgba(255,184,0,.5)';   break;
                        case 'crowded':  weight=1; color='#4f8eff'; glow='rgba(79,142,255,.5)';  break;
                        case 'safe':     weight=0; color='#00ffaa'; glow='rgba(0,255,170,.5)';   break;
                    }

                    dangerPoints.push({ lat, lng, weight });

                    const icon = divIcon(
                        `<div style="width:18px;height:18px;border-radius:50%;background:${color};
                         border:2px solid rgba(255,255,255,.25);box-shadow:0 0 10px ${glow};"></div>`,
                        [18,18]
                    );
                    const m = L.marker([lat, lng], { icon }).addTo(map)
                               .bindPopup(`<b>${(d.type||'Unknown').toUpperCase()}</b><br>Risk weight: ${weight}`);
                    reportMarkers.push(m);
                });

                isSafeDataReady = true;
                const dot  = document.getElementById('status-dot');
                const text = document.getElementById('status-text');
                dot.classList.add('ready');
                text.textContent = `${snapshot.size} reports loaded`;
                setTimeout(() =>
                    document.getElementById('data-status').classList.add('hidden'), 3000);

            }, err => {
                console.error('Firestore checkins error:', err);
                // Still allow routing even if Firebase fails
                isSafeDataReady = true;
                document.getElementById('status-text').textContent = 'Safety data unavailable';
                setTimeout(() =>
                    document.getElementById('data-status').classList.add('hidden'), 3000);
            });
        }

        /* ─── Firebase: Safe Zones (Police Stations) ─────────────────────── */
        function initSafeZones() {
            onSnapshot(query(collection(db, 'safezones')), snapshot => {
                safeZonesData.forEach(z => map.removeLayer(z.marker));
                safeZonesData = [];

                snapshot.forEach(doc => {
                    const d   = doc.data();
                    const lat = d.location?.latitude;
                    const lng = d.location?.longitude;
                    if (!lat || !lng) return;

                    const icon = divIcon(
                        `<div style="width:22px;height:22px;border-radius:50%;background:#2563eb;
                         border:2px solid #fff;display:flex;align-items:center;justify-content:center;
                         color:#fff;font-weight:700;font-size:11px;
                         box-shadow:0 0 10px rgba(37,99,235,.6);">P</div>`,
                        [22,22]
                    );
                    const m = L.marker([lat, lng], { icon }).addTo(map)
                               .bindPopup(`<b>🛡️ ${d.name || 'Police Station'}</b><br>Safe Zone`);
                    safeZonesData.push({ lat, lng, name: d.name || 'Safe Zone', marker: m });
                });
            });
        }

        /* ─── Safe Zone Proximity Alert ──────────────────────────────────── */
        let notifiedZone = null;
        function startSafeZoneChecker() {
            setInterval(() => {
                if (!currentPosition || !safeZonesData.length) return;
                for (const z of safeZonesData) {
                    const dist = L.latLng(currentPosition.lat, currentPosition.lng)
                                  .distanceTo(L.latLng(z.lat, z.lng));
                    if (dist < 250 && notifiedZone !== z.name) {
                        showToast(`🛡️ Safe zone nearby: ${z.name}`, 'ok');
                        notifiedZone = z.name;
                        setTimeout(() => { notifiedZone = null; }, 60000);
                        break;
                    }
                }
            }, 5000);
        }

        /* ─── SOS Button ─────────────────────────────────────────────────── */
        document.getElementById('sos-btn').addEventListener('click', () => {
            if (!currentPosition) {
                showToast('Location unavailable — please allow location access.', 'err'); return;
            }
            const email   = 'arpit.23bce7565@vitapstudent.ac.in';
            const subject = 'SOS Alert - Urgent Help Needed';
            const body    = `I need urgent help.\n\nMy location:\n` +
                            `Latitude:  ${currentPosition.lat}\n` +
                            `Longitude: ${currentPosition.lng}\n\n` +
                            `https://www.google.com/maps?q=${currentPosition.lat},${currentPosition.lng}`;
            window.location.href =
                `mailto:${encodeURIComponent(email)}` +
                `?subject=${encodeURIComponent(subject)}` +
                `&body=${encodeURIComponent(body)}`;
        });

        /* ─── Boot ───────────────────────────────────────────────────────── */
        initMap();
        initGeo();
        initHeatmap();
        initSafeZones();

        // Fallback: allow routing even if Firebase never responds
        setTimeout(() => {
            if (!isSafeDataReady) {
                isSafeDataReady = true;
                console.warn('Firebase timeout — routing enabled with no safety overlay.');
            }
        }, 8000);

    </script>
